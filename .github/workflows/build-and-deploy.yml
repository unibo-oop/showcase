name: Build and deploy
on:
  push:
    branches-ignore:
      - 'dependabot/**'
      - 'renovate/**'
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/workflows/update-hugo.yml'
  pull_request:
  workflow_dispatch:

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: danysk/action-checkout@0.2.28
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.0.0
        with:
          hugo-version: '0.160.1'
          extended: true
      - uses: actions/setup-node@v6
        with:
          node-version: 18.4.0
          cache: 'npm'
      - name: Setup the context
        run: npm install
      - name: Build with hugo
        run: hugo
      - name: Find if secrets are available
        id: secrets
        uses: DanySK/are-secrets-available@1.0.0
        with:
          secrets: ${{ toJson(secrets) }}
      - name: Run Hugo server
        if: steps.secrets.outputs.has-secrets
        run: |
          nohup hugo server & echo $! > /tmp/hugo.pid
          for i in $(seq 1 60); do
            curl -fsS http://localhost:1313/showcase/ > /dev/null || sleep 1;
          done
          cat /tmp/hugo.log
      - name: Link Check
        if: steps.secrets.outputs.has-secrets
        id: lychee
        uses: lycheeverse/lychee-action@v2.7.0
        with:
          args: >-
            --accept '200, 302'
            http://localhost:1313/showcase/
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy website
        if: ${{ github.event_name != 'pull_request' }}
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: public

